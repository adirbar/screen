<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ענן מילים דינמי - גרסה 9 (תיקון באג חיתוך RTL)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.0.1/wordcloud2.min.js"></script>
    
    <style>
        html, body {
            width: 1024px;
            height: 512px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        #widget-container {
            width: 1024px;
            height: 512px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 15px;
            box-sizing: border-box;
            position: relative;
        }

        #header-container {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 15px;
        }

        #logo {
            max-height: 50px;
            margin-bottom: 5px;
            display: none;
        }

        #title {
            font-size: 28px;
            font-weight: 800;
            color: #f1f5f9;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            margin: 0;
            direction: rtl;
            text-align: center;
            line-height: 1.3;
            max-width: 95%;
            word-wrap: break-word;
            white-space: normal;
        }

        /* כאן הגדרנו את אזור הקנבס להיות LTR כדי שהספרייה לא תדחוף מילים שמאלה */
        #canvas-container {
            width: 100%;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            direction: ltr; /* קריטי לפתרון הבאג */
        }

        canvas {
            display: block;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #fff;
            text-align: center;
            background: rgba(30, 41, 59, 0.95);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div id="header-container">
            <img id="logo" src="" alt="לוגו" onerror="this.style.display='none';">
            <h1 id="title">טוען נתונים...</h1>
        </div>

        <div id="canvas-container">
            <div id="loading">טוען נתונים מהגליון...</div>
            <canvas id="word-cloud-canvas" width="960" height="350" dir="ltr"></canvas>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const SPREADSHEET_ID = urlParams.get('id') || 'YOUR_DEFAULT_SPREADSHEET_ID';
        const RANGE = urlParams.get('range') || 'A1:C6';
        const SHEET_NAME = urlParams.get('sheet') || '';
        const LOGO_URL = urlParams.get('logo') || '';

        const logoImg = document.getElementById('logo');
        if (LOGO_URL) {
            logoImg.src = LOGO_URL;
            logoImg.style.display = 'inline-block';
        }

        if (SPREADSHEET_ID === 'YOUR_DEFAULT_SPREADSHEET_ID') {
            document.getElementById('loading').innerHTML = "נא להגדיר את מפתח הגליון ב-URL.";
        } else {
            fetchSheetData();
        }

        window.google = {
            visualization: {
                Query: {
                    setResponse: function(data) {
                        processData(data);
                    }
                }
            }
        };

        function fetchSheetData() {
            let url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&range=${RANGE}`;
            if (SHEET_NAME) {
                url += `&sheet=${encodeURIComponent(SHEET_NAME)}`;
            }

            const script = document.createElement('script');
            script.src = url;
            script.onerror = function() {
                document.getElementById('loading').innerHTML = "שגיאת רשת: לא ניתן לפנות לשרתי גוגל מהדפדפן.";
            };
            document.body.appendChild(script);
        }

        function processData(data) {
            if (data.status === 'error') {
                const errMsg = data.errors && data.errors[0] ? data.errors[0].message : 'שגיאה לא ידועה';
                document.getElementById('loading').innerHTML = `שגיאה מגוגל שיטס:<br><b>${errMsg}</b><br><small>בדוק שהטווח חוקי.</small>`;
                return;
            }

            try {
                const rows = data.table.rows;
                const cols = data.table.cols;

                const titleText = (cols && cols[0] && cols[0].label) ? cols[0].label : 'ענן מילים';
                document.getElementById('title').innerText = titleText;

                const wordList = [];
                
                // תווים נסתרים שמכריחים את הקנבס (שעכשיו מוגדר כ-LTR) לצייר את המשפט בעברית תקינה
                const RLE = '\u202B'; // Right-to-Left Embedding
                const PDF = '\u202C'; // Pop Directional Formatting

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (row && row.c) {
                        const textVal = row.c[0] ? row.c[0].v : null; 
                        
                        let percentVal = "";
                        if (row.c[1]) {
                            const formatted = row.c[1].f ? row.c[1].f : row.c[1].v;
                            if (formatted !== null && formatted !== undefined) {
                                if (typeof formatted === 'number' && formatted <= 1) {
                                    percentVal = Math.round(formatted * 100) + "%";
                                } else {
                                    percentVal = formatted.toString().trim();
                                    if (!percentVal.includes('%') && !isNaN(percentVal)) {
                                        percentVal += "%";
                                    }
                                }
                            }
                        }

                        const countVal = (row.c[2] && row.c[2].v !== null) ? Number(row.c[2].v) : 0; 
                        
                        if (textVal && !isNaN(countVal) && countVal > 0) {
                            // שימוש ב-RLE ו-PDF כדי לשמור על מבנה המשפט והסוגריים מושלם בעברית
                            const combinedText = percentVal ? `${RLE}${textVal} (${percentVal})${PDF}` : `${RLE}${textVal}${PDF}`;
                            wordList.push([combinedText, countVal]);
                        }
                    }
                }

                if (wordList.length === 0) {
                    document.getElementById('loading').innerHTML = "לא נמצאו נתונים להצגה בטווח זה.";
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                drawWordCloud(wordList);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "שגיאה בעיבוד הנתונים: " + error.message;
            }
        }

        function drawWordCloud(words) {
            const canvas = document.getElementById('word-cloud-canvas');
            const maxWeight = Math.max(...words.map(w => w[1]), 1);
            
            WordCloud(canvas, {
                list: words,
                weightFactor: function (size) {
                    // כעת כשהמתמטיקה עובדת מדויק, אפשר לחזור לגודל פונט יפה ובולט
                    return Math.max(16, (size / maxWeight) * 45);
                },
                fontWeight: '800',
                fontFamily: 'Segoe UI, Arial, sans-serif',
                color: function (word, weight) {
                    const colors = ['#38bdf8', '#60a5fa', '#818cf8', '#a78bfa', '#cbd5e1'];
                    const ratio = weight / maxWeight;
                    if (ratio > 0.8) return colors[0];
                    if (ratio > 0.5) return colors[1];
                    if (ratio > 0.3) return colors[2];
                    return colors[3];
                },
                backgroundColor: 'transparent',
                rotateRatio: 0,
                gridSize: 10,
                drawOutOfBound: false,
                shrinkToFit: true, 
                shape: 'square',
                minRotation: 0,
                maxRotation: 0,
                clearCanvas: true
            });
        }
    </script>
</body>
</html>
